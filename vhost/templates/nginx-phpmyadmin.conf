server {
    listen 80;
    listen [::]:80;

    server_name {DOMAIN};
    root {DOCUMENT_ROOT};
    index index.php;

    charset utf-8;

    # ACME challenge (kept for SSL renewal after step 11)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Security headers — phpMyAdmin should never be framed or indexed
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;

    # Reasonable size for SQL imports
    client_max_body_size 256M;
    client_body_timeout 300s;
    send_timeout 300s;

    access_log /var/log/nginx/{DOMAIN}-access.log;
    error_log /var/log/nginx/{DOMAIN}-error.log;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php{PHP_VERSION}-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # Static assets shipped with phpMyAdmin
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        access_log off;
    }

    # Lock down phpMyAdmin internals
    location ~ ^/(libraries|setup/lib|setup/frames|templates|vendor)/.*\.php$ {
        deny all;
    }
    location ~ ^/(README|CHANGELOG|LICENSE|composer\.json|composer\.lock|RELEASE-DATE|config\.sample\.inc\.php)$ {
        deny all;
    }
    location ~ /\. {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; return 200 "User-agent: *\nDisallow: /\n"; }
}
