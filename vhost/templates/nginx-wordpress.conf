server {
    listen 80;
    listen [::]:80;

    server_name {DOMAIN};
    root {DOCUMENT_ROOT};
    index index.php index.html;

    charset utf-8;

    # ACME challenge (kept for SSL renewal after step 11)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Client limits (uploads, large media)
    client_max_body_size 256M;
    client_body_timeout 120s;
    send_timeout 120s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vtt
        text/x-component
        text/xml;

    access_log /var/log/nginx/{DOMAIN}-access.log;
    error_log /var/log/nginx/{DOMAIN}-error.log;

    # WordPress pretty permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php{PHP_VERSION}-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Block direct access to sensitive WordPress files
    location ~* /(wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt) {
        deny all;
    }

    # Deny PHP execution in uploads (common WP hardening)
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # Block xmlrpc.php (common attack surface; comment out if needed)
    location = /xmlrpc.php {
        deny all;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
