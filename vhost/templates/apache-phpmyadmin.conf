<VirtualHost *:80>
    ServerName {DOMAIN}
    DocumentRoot {DOCUMENT_ROOT}

    # Security headers — phpMyAdmin should never be framed or indexed
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer"
    Header always set X-Robots-Tag "noindex, nofollow, noarchive, nosnippet"

    <Directory {DOCUMENT_ROOT}>
        AllowOverride All
        Require all granted
    </Directory>

    # PHP-FPM via proxy
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php{PHP_VERSION}-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Lock down phpMyAdmin internals
    <DirectoryMatch "{DOCUMENT_ROOT}/(libraries|setup/lib|setup/frames|templates|vendor)">
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </DirectoryMatch>

    <FilesMatch "^(README|CHANGELOG|LICENSE|composer\.json|composer\.lock|RELEASE-DATE|config\.sample\.inc\.php)$">
        Require all denied
    </FilesMatch>

    <DirectoryMatch "/\.">
        Require all denied
    </DirectoryMatch>

    <FilesMatch "^\.ht">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/{DOMAIN}-error.log
    CustomLog ${APACHE_LOG_DIR}/{DOMAIN}-access.log combined
</VirtualHost>
